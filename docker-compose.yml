services:
  faste-server:
    image: faste-server
    container_name: faste-server
    restart: always
    depends_on:
      - elasticsearch
      - kibana
      - rabbitmq
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    command: npm run start:dev
    env_file:
      - .env
    ports:
      - "8080:8080"
    networks:
      - faste-network
  rabbitmq:
    image: rabbitmq:3-management
    container_name: faste-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - faste-network
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.1
    container_name: faste-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - faste-network
    restart: unless-stopped
  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.1
    container_name: faste-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - faste-network
    restart: unless-stopped

  # redis:
  #   image: redis/redis-stack:latest
  #   restart: always
