name: Build & run test (npm)

on:
  workflow_dispatch:
  push:
    branches: ['main']
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - '!**/README*.md'
      - '!docs/**'
  pull_request:
    branches: ['main']
    types: [opened, synchronize]
    paths:
      - 'src/**'
      - 'test/**'
      - 'package.json'
      - 'package-lock.json'
      - '!**/README*.md'
      - '!docs/**'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    timeout-minutes: 15
    if: |
      !contains(github.event.pull_request.labels.*.name, 'skip-ci') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-actions')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    strategy:
      matrix:
        node-version: [20.16.0]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build project
        run: npm run build

      # - name: Build docs
      #   run: npm run docs:build

      - name: Run Unit Tests
        run: npm test
